schema_version: 1

context:
  name: maggma
  version: 0.73.0
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/maggma-${{ version }}.tar.gz
  sha256: 5538f1ba6ee999a3b6d67e70126323d7e283aa8bce1ef1c3a789b77b6779dfea

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - mrun = maggma.cli:run

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0.0
    - setuptools-scm >=5
    - pip
  run:
    - paramiko >=5.0
    - jsonlines >=4.0.0
    - pandas >=2.2
    - python >=${{ python_min }}
    - ruamel.yaml >=0.17
    - pydantic >=2.0
    - pydantic-settings >=2.0.3
    - pymongo >=4.2.0,<4.11
    - monty >=2024.5.24
    - mongomock >=3.10.0
    - pydash >=4.1.0
    - jsonschema >=3.1.1
    - tqdm >=4.19.6
    - aioitertools >=0.5.1
    - numpy >=1.26
    - pyzmq >=25.1.1
    - dnspython >=1.16.0
    - msgpack-python >=0.5.6
    - orjson >=3.9.0
    - boto3 >=1.20.41
    - python-dateutil >=2.8.2
    - click

tests:
  - python:
      imports:
        - maggma
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - mrun --help

about:
  summary: Framework to develop datapipelines from files on disk to full dissemenation API
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/materialsproject/maggma

extra:
  recipe-maintainers:
    - jan-janssen
